<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%233b82f6'/></svg>">
<title>agent-usage — AI Coding Agent Usage</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="global-loader"></div>
<div class="app-container">
  <div class="top-bar">
    <div class="top-bar-header">
      <div class="app-brand" role="img" aria-label="agent-usage">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <path d="M870.4 12.8H153.6A140.9024 140.9024 0 0 0 12.8 153.6v716.8A140.9024 140.9024 0 0 0 153.6 1011.2h504.32a38.4 38.4 0 0 0 0-76.8H153.6c-35.2768 0-64-28.7232-64-64V153.6c0-35.2768 28.7232-64 64-64h716.8c35.2768 0 64 28.7232 64 64v716.8c0 35.2768-28.7232 64-64 64h-11.4688a38.4 38.4 0 0 0 0 76.8H870.4A140.9024 140.9024 0 0 0 1011.2 870.4V153.6A140.9024 140.9024 0 0 0 870.4 12.8z" fill="currentColor"/>
          <path d="M256 371.2a38.4 38.4 0 0 0-38.4 38.4v409.6a38.4 38.4 0 0 0 76.8 0V409.6A38.4 38.4 0 0 0 256 371.2zM473.6 256v512a38.4 38.4 0 0 0 76.8 0V256a38.4 38.4 0 0 0-76.8 0zM768 576a38.4 38.4 0 0 0-38.4 38.4v204.8a38.4 38.4 0 0 0 76.8 0v-204.8a38.4 38.4 0 0 0-38.4-38.4zM257.024 217.6h-0.512c-21.1968 0-38.144 17.2032-38.144 38.4s17.4592 38.4 38.656 38.4a38.4 38.4 0 0 0 0-76.8z" fill="currentColor"/>
        </svg>
      </div>
      <div class="top-bar-controls">
        <div class="date-range-wrap" id="range-control-wrap">
          <button type="button" class="date-range-trigger" id="date-range-trigger" aria-haspopup="dialog" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M3 10h18"></path><rect x="3" y="4" width="18" height="18" rx="2"></rect></svg>
            <span id="date-range-label"></span>
            <svg class="range-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg>
          </button>
          <div class="date-range-popover" id="date-range-popover" role="dialog" aria-label="Date range picker" hidden inert aria-hidden="true">
            <div class="date-shortcuts" id="date-shortcuts"></div>
            <div class="date-range-head">
              <button type="button" class="calendar-nav" id="calendar-prev" aria-label="Previous month">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
              </button>
              <div class="calendar-title" id="calendar-title"></div>
              <button type="button" class="calendar-nav" id="calendar-next" aria-label="Next month">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg>
              </button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="date-range-footer">
              <button type="button" class="ctrl-btn primary" id="calendar-apply" data-i18n="apply">Apply</button>
            </div>
          </div>
        </div>
        <div class="separator"></div>
        <select id="sel-granularity"></select>
        <select id="sel-compare-mode" title="Compare"></select>
        <div class="separator"></div>
        <select id="filter-source" style="padding:6px 12px;">
          <option value="">All Sources</option>
          <option value="claude">Claude Code</option>
          <option value="codex">Codex</option>
          <option value="openclaw">OpenClaw</option>
          <option value="opencode">OpenCode</option>
          <option value="kiro">Kiro CLI</option>
          <option value="pi">Pi</option>
        </select>
        <select id="filter-model" style="padding:6px 12px;">
          <option value="">All Models</option>
        </select>
        <div class="ctrl-actions">
          <button class="ctrl-btn primary" id="btn-refresh">
            <svg class="icon-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
            <span data-i18n="refresh">Refresh</span>
          </button>
          <button class="ctrl-btn" id="btn-auto-refresh">
            <span id="auto-status">Auto</span>
          </button>
          <select id="sel-refresh-interval"></select>
          <select id="sel-theme" title="Theme"></select>
          <select id="sel-lang" title="Language"></select>
        </div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="label" data-i18n="totalTokens">Total Tokens</div><div class="value tokens" id="s-tokens">0</div><div class="delta" id="d-tokens"></div></div>
    <div class="stat-card"><div class="label" data-i18n="totalCost">Total Cost</div><div class="value cost" id="s-cost">$0.00</div><div class="delta" id="d-cost"></div></div>
    <div class="stat-card"><div class="label" data-i18n="sessions">Sessions</div><div class="value sessions" id="s-sessions">0</div><div class="delta" id="d-sessions"></div></div>
    <div class="stat-card"><div class="label" data-i18n="prompts">Prompts</div><div class="value prompts" id="s-prompts">0</div><div class="delta" id="d-prompts"></div></div>
    <div class="stat-card"><div class="label" data-i18n="apiCalls">API Calls</div><div class="value calls" id="s-calls">0</div><div class="delta" id="d-calls"></div></div>
    <div class="stat-card"><div class="label" data-i18n="cacheHitRate">Cache Hit Rate</div><div class="value" id="s-cache-hit">0%</div><div class="delta" id="d-cache-hit"></div></div>
  </div>

  <div class="charts">
    <div class="chart-card trend-compare-card" id="trend-compare-card" style="grid-column: 1 / -1;">
      <div class="chart-card-head">
        <div class="chart-title-block">
          <h3 data-i18n="trendCompare">Trend Comparison</h3>
          <div class="chart-subtitle" id="compare-range-label"></div>
        </div>
        <div class="trend-period-toggle" id="trend-period-toggle" role="group" aria-label="Trend period display">
          <button type="button" class="trend-period-btn" data-active-periods="false" data-i18n="allPeriods">All Periods</button>
          <button type="button" class="trend-period-btn" data-active-periods="true" data-i18n="activePeriods">Active Periods</button>
        </div>
      </div>
      <div class="chart-container trend-compare-container" id="chart-compare"></div>
      <div class="trend-breakdowns" id="trend-breakdowns"></div>
    </div>
    <div class="chart-card" style="grid-column: 1 / -1;"><h3 data-i18n="tokenUsage">Token Usage Breakdown</h3><div class="chart-container" id="chart-tokens"></div></div>
    <div class="chart-card" style="grid-column: span 3;"><h3 data-i18n="costOverTime">Cost Trend</h3><div class="chart-container" id="chart-cost"></div></div>
    <div class="chart-card" style="grid-column: span 2;"><h3 data-i18n="costByModel">Cost Distribution</h3><div class="chart-container" id="chart-pie"></div></div>
  </div>

  <div class="sessions-card">
    <div class="sessions-header">
      <h3 data-i18n="sessionLog">Session Log</h3>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <input type="text" id="filter-project" class="filter-input" placeholder="Filter by project...">
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="source" data-i18n="source">Source</th>
            <th class="sortable" data-sort="project" data-i18n="project">Project</th>
            <th class="sortable" data-sort="git_branch" data-i18n="branch">Branch</th>
            <th class="sortable" data-sort="start_time" data-i18n="time">Time</th>
            <th class="sortable" data-sort="prompts" data-i18n="prompts">Prompts</th>
            <th class="sortable" data-sort="tokens" data-i18n="tokens">Tokens</th>
            <th class="sortable" data-sort="total_cost" data-i18n="cost">Cost</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="session-table"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
<script src="js/core.js"></script>
<script src="js/charts.js"></script>
<script src="js/sessions.js"></script>
<script src="js/date-picker.js"></script>
<script src="js/controls.js"></script>
<script src="js/bootstrap.js"></script>
</body>
</html>
