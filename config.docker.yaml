server:
  port: 9800
  bind_address: "0.0.0.0"

collectors:
  claude:
    enabled: true
    paths: ["/sessions/claude"]
    scan_interval: 60s
  codex:
    enabled: true
    paths: ["/sessions/codex"]
    scan_interval: 60s
  openclaw:
    enabled: true
    paths: ["/sessions/openclaw"]
    scan_interval: 60s
  opencode:
    enabled: true
    paths: ["/sessions/opencode/opencode.db"]
    scan_interval: 60s
  mimocode:
    enabled: true
    paths: ["/sessions/mimocode/mimocode.db"]
    scan_interval: 60s
  kiro:
    enabled: true
    paths: ["/sessions/kiro/cli"]
    scan_interval: 60s

storage:
  path: "/data/agent-usage.db"

pricing:
  # Prices are downloaded from litellm and cached locally. Set HTTPS_PROXY env var if this fails.
  sync_interval: 1h
  source_url: "https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json"
  cache_path: "/data/model_prices_and_context_window.json"
